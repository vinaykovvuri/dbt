version: 2

sources:
  - name: customer_source
    database: dbt_customer
    schema: raw_layer

    tables:
      - name: raw_customers
        description: "Here all the raw data of customers is available"

        columns:
          - name: customer_id
            data_tests:
              - unique
              - not_null
          - name: customer_name
            data_tests:
              - not_null

      - name: raw_orders
        columns:
          - name: order_id
            data_tests:
              - unique
              - not_null
          - name: customer_id
            data_tests:
              - relationships:
                  arguments:
                    to: source('customer_source','raw_customers')
                    field: customer_id
        
      - name: raw_payments
        columns:
          - name: payment_id
            data_tests:
              - unique
              - not_null
          - name: order_id
            data_tests:
              - relationships:
                  arguments:
                    to: source('customer_source','raw_orders')
                    field: order_id
          