version: 2 

sources:
  - name: tpch_source
    database: snowflake_sample_data
    schema: tpch_sf1
    tables:
      - name: orders 
        columns:
          - name: o_orderkey
            data_tests:
              - unique
              - not_null
      
      - name: lineitem
        columns:
          - name: l_orderkey
            data_tests:
              - relationships:
                  arguments:
                    field: o_orderkey
                    to: "{{ source('tpch_source','orders') }}"
              
              




